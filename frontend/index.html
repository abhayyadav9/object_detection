<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>YOLO Detection Test</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    h1 {
      color: #00eaff;
    }

    #video-container {
      position: relative;
      width: 500px;
      height: 380px;
    }

    video, #output-canvas {
      position: absolute;
      top: 0;
      left: 0;
      border: 2px solid #00eaff;
      border-radius: 10px;
      width: 500px;
      height: 380px;
      object-fit: cover;
    }

    #log {
      margin-top: 20px;
      font-size: 16px;
      color: #0f0;
    }

    #detections {
      margin-top: 10px;
      font-size: 14px;
      white-space: pre-wrap;
      color: #f1f1f1;
    }

  </style>
</head>

<body>

  <h1>Live Object Detection Tester</h1>

  <div id="video-container">
    <video id="video" autoplay></video>
    <canvas id="output-canvas"></canvas>
  </div>
  
  <canvas id="canvas" style="display:none"></canvas>

  <div id="log">Initializing camera...</div>
  <div id="detections"></div>

  <script>
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const outputCanvas = document.getElementById("output-canvas");
    const log = document.getElementById("log");
    const detectionsBox = document.getElementById("detections");
    let lastFrameTime = 0;
    const frameInterval = 300; // Send frame every 300ms (around 3 FPS)

    // Start Webcam
    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = stream;
        log.innerText = "Camera started. Sending frames to backend...";
        video.onloadedmetadata = () => {
          outputCanvas.width = video.videoWidth;
          outputCanvas.height = video.videoHeight;
          requestAnimationFrame(processVideo);
        };
      } catch (err) {
        log.innerText = "Camera Error: " + err;
      }
    }

    startCamera();

    function drawDetections(detections) {
      const ctx = outputCanvas.getContext("2d");
      ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
      ctx.drawImage(video, 0, 0, ctx.canvas.width, ctx.canvas.height);

      detections.forEach(det => {
        const [x1, y1, x2, y2] = det.box;
        const label = `${det.label} ${det.confidence.toFixed(2)}`;

        ctx.strokeStyle = "#00eaff";
        ctx.lineWidth = 2;
        ctx.strokeRect(x1, y1, x2 - x1, y2 - y1);

        ctx.fillStyle = "#00eaff";
        ctx.font = "16px Arial";
        ctx.fillText(label, x1, y1 > 20 ? y1 - 10 : y1 + 20);
      });
    }

    // Capture frame & send to backend
    async function sendFrame() {
      if (!video.videoWidth) return;

      const ctx = canvas.getContext("2d");
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      canvas.toBlob(async (blob) => {
        const formData = new FormData();
        formData.append("image", blob, "frame.jpg");

        try {
          const res = await fetch("http://localhost:5001/detect", {
            method: "POST",
            body: formData
          });

          const data = await res.json();

          if (data.success) {
            log.innerText = `Detection Time: ${data.inference_time_ms} ms`;
            detectionsBox.innerText = JSON.stringify(data.detections, null, 2);
            drawDetections(data.detections);
          } else {
            // If no detections, just draw the video
            const ctx = outputCanvas.getContext("2d");
            ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
            ctx.drawImage(video, 0, 0, ctx.canvas.width, ctx.canvas.height);
          }

        } catch (err) {
          log.innerText = "Error sending frame: " + err;
        }
      }, "image/jpeg", 0.8);
    }

    async function processVideo(now) {
      requestAnimationFrame(processVideo);
      if (!video.videoWidth) return;

      const ctx = outputCanvas.getContext("2d");
      ctx.drawImage(video, 0, 0, outputCanvas.width, outputCanvas.height);

      if (now - lastFrameTime < frameInterval) {
        return;
      }
      lastFrameTime = now;
      await sendFrame();
    }
  </script>

</body>
</html>
